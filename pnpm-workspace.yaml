packages:
  - apps/*
  - packages/*

catalog:
  # Trial upgrade to satisfy upstream Solana keychain v1 peer requirements.
  '@solana-program/system': ^0.12.0
  '@solana-program/token-2022': ^0.9.0
  '@solana/addresses': ^6.5.0
  '@solana/codecs': ^6.5.0
  '@solana/instructions': ^6.5.0
  '@solana/keys': ^6.5.0
  '@solana/kit': ^6.5.0
  '@solana/mosaic-sdk': 0.1.1
  '@solana/programs': ^6.5.0
  '@solana/rpc': ^6.5.0
  '@solana/signers': ^6.5.0
  '@solana/sysvars': ^6.5.0
  '@solana/transactions': ^6.5.0

strictPeerDependencies: false
# pnpm 10.16 matches minimumReleaseAgeExclude by exact dependency alias.
# Keep @solana packages explicit until this workspace can rely on scoped wildcard exclusions.
minimumReleaseAgeExclude:
  - '@solana/accounts'
  - '@solana/addresses'
  - '@solana/assertions'
  - '@solana/codecs'
  - '@solana/codecs-core'
  - '@solana/codecs-data-structures'
  - '@solana/codecs-numbers'
  - '@solana/codecs-strings'
  - '@solana/design-system'
  - '@solana/errors'
  - '@solana/fast-stable-stringify'
  - '@solana/functional'
  - '@solana/instruction-plans'
  - '@solana/instructions'
  - '@solana/keychain'
  - '@solana/keychain-aws-kms'
  - '@solana/keychain-cdp'
  - '@solana/keychain-core'
  - '@solana/keychain-crossmint'
  - '@solana/keychain-dfns'
  - '@solana/keychain-fireblocks'
  - '@solana/keychain-gcp-kms'
  - '@solana/keychain-memory'
  - '@solana/keychain-openfort'
  - '@solana/keychain-para'
  - '@solana/keychain-privy'
  - '@solana/keychain-test-utils'
  - '@solana/keychain-turnkey'
  - '@solana/keychain-utila'
  - '@solana/keychain-vault'
  - '@solana/keys'
  - '@solana/kit'
  - '@solana/kit-plugin-instruction-plan'
