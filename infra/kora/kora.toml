# Kora Configuration for SDP Local Development
# Fee payer relay for gasless Token-2022 transactions

[kora]
rate_limit = 100

[kora.auth]
# No auth for local development

[kora.cache]
enabled = true
url = "redis://redis:6379"
default_ttl = 300
account_ttl = 60

[kora.enabled_methods]
liveness = true
estimate_transaction_fee = true
get_supported_tokens = true
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = true
get_blockhash = true
get_config = true
get_payer_signer = true

[validation]
max_allowed_lamports = 10000000  # 0.01 SOL max per tx
max_signatures = 10
price_source = "Mock"           # Use Mock for devnet (no real price oracle)
allow_durable_transactions = false

# Programs allowed for SDP Token-2022 issuance, sRFC-37 ACL operations, and
# MagicBlock private transfer transactions.
allowed_programs = [
    "11111111111111111111111111111111",              # System Program
    "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",   # Token Program (legacy)
    "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb",  # Token-2022 Program
    "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL",  # Associated Token Program
    "TACLkU6CiCdkQN2MjoyDkVg2yAH9zkxiHDsiztQ52TP",   # Token-ACL (sRFC-37)
    "GATEzzqxhJnsWF6vHRsgtixxSB8PaQdcqGEVTEHWiULz",  # ABL / GATE Program
    "SPLxh1LVZzEkX99H6rqYizhytLWPZVV296zyYDPagv2",   # MagicBlock private transfer program
    "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr",   # Memo Program
    "AddressLookupTab1e1111111111111111111111111",   # Address Lookup Table
    "ComputeBudget111111111111111111111111111111",   # Compute Budget
]

# Tokens allowed - SOL and all Token-2022 mints
# Native SOL (wrapped) is required for fee payment
allowed_tokens = ["So11111111111111111111111111111111111111112"]

# SPL tokens that can be used to pay fees (empty for SOL-only)
allowed_spl_paid_tokens = []

disallowed_accounts = []

# Fee payer policy - allow all Token-2022 operations
[validation.fee_payer_policy]

[validation.fee_payer_policy.system]
allow_transfer = true
allow_assign = true
allow_create_account = true
allow_allocate = true

[validation.fee_payer_policy.system.nonce]
allow_initialize = true
allow_advance = true
allow_authorize = true
allow_withdraw = true

[validation.fee_payer_policy.spl_token]
allow_transfer = true
allow_burn = true
allow_close_account = true
allow_approve = true
allow_revoke = true
allow_set_authority = true
allow_mint_to = true
allow_initialize_mint = true
allow_initialize_account = true
allow_initialize_multisig = true
allow_freeze_account = true
allow_thaw_account = true

[validation.fee_payer_policy.token_2022]
allow_transfer = true
allow_burn = true
allow_close_account = true
allow_approve = true
allow_revoke = true
allow_set_authority = true
allow_mint_to = true
allow_initialize_mint = true
allow_initialize_account = true
allow_initialize_multisig = true
allow_freeze_account = true
allow_thaw_account = true

[validation.price]
type = "free"  # Free for local development

# Token-2022 extension policy - allow all for SDP
[validation.token2022]
blocked_mint_extensions = []
blocked_account_extensions = []

[metrics]
enabled = true
endpoint = "/metrics"
port = 8080
scrape_interval = 60

[metrics.fee_payer_balance]
enabled = true
expiry_seconds = 30

[kora.usage_limit]
enabled = false
max_transactions = 1000
fallback_if_unavailable = true
