name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

env:
  CI_IS_FORK_PULL_REQUEST: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          git diff --name-only --diff-filter=d -z origin/main...HEAD \
            | xargs -0 --no-run-if-empty pnpm exec biome check --no-errors-on-unmatched

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Detect changed packages
        id: changed
        run: |
          CHANGED_PACKAGES=$(git diff --name-only origin/main...HEAD | awk -F/ '/^(apps|packages)\// {print $1 "/" $2}' | sort -u | tr '\n' ' ' | xargs)
          echo "packages=${CHANGED_PACKAGES}" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        if: steps.changed.outputs.packages != ''
        run: |
          FILTERS=""
          for pkg in ${{ steps.changed.outputs.packages }}; do
            FILTERS="$FILTERS --filter ./$pkg"
          done
          pnpm --if-present $FILTERS typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      CI_HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI != '' }}
      DATABASE_URL: postgresql://sdp:sdp@127.0.0.1:5432/sdp
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sdp
          POSTGRES_USER: sdp
          POSTGRES_PASSWORD: sdp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdp -d sdp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Doppler bootstrap secret
        if: env.CI_IS_FORK_PULL_REQUEST != 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
        run: |
          if [ -z "${DOPPLER_TOKEN}" ]; then
            echo "DOPPLER_TOKEN_CI must be configured for secret-aware CI jobs." >&2
            exit 1
          fi

      - name: Install Doppler CLI
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        uses: dopplerhq/cli-action@v4

      - name: Unit tests (Doppler)
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
          DOPPLER_CONFIG: dev_ci
        run: pnpm test

      - name: Unit tests (fork-safe)
        if: env.CI_IS_FORK_PULL_REQUEST == 'true' && env.CI_HAS_DOPPLER_TOKEN != 'true'
        run: |
          echo "::notice title=Fork-safe unit tests::DOPPLER_TOKEN_CI is unavailable to forked pull requests, so unit tests are running with local defaults instead of Doppler dev_ci secrets."
          node scripts/run-workspace-tests.mjs unit

      - name: Scripts tests
        run: pnpm test:scripts

  build_api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build API (Wrangler dry-run)
        run: pnpm --filter ./apps/sdp-api build

  docker_build_api:
    name: Docker Build API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build sdp-api image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/sdp-api/Dockerfile
          push: false
          load: false
          provenance: false
          sbom: false
          tags: sdp-api:ci-${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=sdp-api
          cache-to: type=gha,scope=sdp-api,mode=max

  docker_build_docs:
    name: Docker Build Docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build sdp-docs image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/sdp-docs/Dockerfile
          push: false
          load: false
          provenance: false
          sbom: false
          tags: sdp-docs:ci-${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=sdp-docs
          cache-to: type=gha,scope=sdp-docs,mode=max

  docker_build_web:
    name: Docker Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build sdp-web image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/sdp-web/Dockerfile
          push: false
          load: false
          provenance: false
          sbom: false
          tags: sdp-web:ci-${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_c21va2UubG9jYWwuY2xlcmsuZGV2JA
            NEXT_PUBLIC_SDP_API_BASE_URL=http://localhost:8787
          cache-from: type=gha,scope=sdp-web
          cache-to: type=gha,scope=sdp-web,mode=max

  docker_compose_smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_c21va2UubG9jYWwuY2xlcmsuZGV2JA
      CLERK_SECRET_KEY: sk_test_dummy_smoke_for_ci_only
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build compose stack
        run: docker compose build

      - name: Bring up stack and wait for healthy
        run: docker compose up -d --wait --wait-timeout 240

      - name: Dump compose state
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans

  build_docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Env configurator drift check
        run: node scripts/check-env-configurator-drift.mjs

      - name: Configurator unit tests
        run: pnpm --filter @sdp/env-config test

      - name: Build docs
        run: pnpm --filter sdp-docs build

  docs_integrity:
    name: Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate public docs artifacts
        run: |
          pnpm --filter sdp-docs generate:api
          pnpm --filter sdp-docs generate:ai

      - name: Check docs links
        run: pnpm --filter sdp-docs check:links

  integration_tests_shard:
    name: Integration Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: Kora
            test_files: src/tests/kora.test.ts src/tests/kora-flow.test.ts
            rpc_provider: alchemy
          - name: Issuance
            test_files: src/tests/issuance-endpoints.test.ts src/tests/token2022.test.ts
            rpc_provider: quicknode
          - name: Mosaic
            test_files: src/tests/mosaic-token-acl.test.ts src/tests/mosaic-abl.test.ts src/tests/mosaic-templates.test.ts
            rpc_provider: triton
          - name: Token Flows
            test_files: src/tests/deploy.test.ts src/tests/mint.test.ts src/tests/burn.test.ts src/tests/freeze.test.ts
            rpc_provider: quicknode
          - name: Access
            test_files: src/tests/payments-wallet-scope.test.ts src/tests/api-keys-flow.test.ts src/tests/api-keys-rotation.test.ts src/tests/custody-local.test.ts
            rpc_provider: alchemy
    env:
      CI_HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI != '' }}
      DATABASE_URL: postgresql://sdp:sdp@127.0.0.1:5432/sdp
      SOLANA_NETWORK: devnet
      INTEGRATION_TEST_FILES: ${{ matrix.test_files }}
      SOLANA_RPC_CI_PREFERRED_PROVIDER: ${{ matrix.rpc_provider }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sdp
          POSTGRES_USER: sdp
          POSTGRES_PASSWORD: sdp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdp -d sdp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Doppler bootstrap secret
        if: env.CI_IS_FORK_PULL_REQUEST != 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
        run: |
          if [ -z "${DOPPLER_TOKEN}" ]; then
            echo "DOPPLER_TOKEN_CI must be configured for secret-aware CI jobs." >&2
            exit 1
          fi

      - name: Install Doppler CLI
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        uses: dopplerhq/cli-action@v4

      - name: Validate integration runtime secrets
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
        run: |
          doppler run --config dev_ci -- bash <<'EOF'
          set -euo pipefail
          if [ -z "${KORA_RPC_URL:-}" ]; then
            echo "KORA_RPC_URL must be set in the dev_ci Doppler config for integration tests." >&2
            exit 1
          fi
          if [ -z "${PRIVY_APP_ID:-}" ] || [ -z "${PRIVY_APP_SECRET:-}" ]; then
            echo "PRIVY_APP_ID and PRIVY_APP_SECRET must be set in the dev_ci Doppler config for integration tests." >&2
            exit 1
          fi
          EOF

      - name: Integration tests
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
          DOPPLER_CONFIG: dev_ci
        run: |
          read -r -a test_files <<< "${INTEGRATION_TEST_FILES}"
          pnpm test:integration -- "${test_files[@]}"

      - name: Skip secret-backed integration tests for fork
        if: env.CI_IS_FORK_PULL_REQUEST == 'true' && env.CI_HAS_DOPPLER_TOKEN != 'true'
        run: |
          echo "::notice title=Fork-safe integration skip::Forked pull requests cannot access DOPPLER_TOKEN_CI, so Kora/Privy-backed integration tests are skipped. Run this PR from an upstream branch before merge if secret-backed coverage is required."

  integration_tests:
    name: Integration Tests (Devnet/Kora)
    runs-on: ubuntu-latest
    needs:
      - integration_tests_shard
    if: always()
    timeout-minutes: 5
    env:
      CI_HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI != '' }}
    steps:
      - name: Check integration test results
        env:
          INTEGRATION_SHARD_RESULT: ${{ needs.integration_tests_shard.result }}
        run: |
          if [ "${CI_IS_FORK_PULL_REQUEST}" = "true" ] && [ "${CI_HAS_DOPPLER_TOKEN}" != "true" ] && [ "${INTEGRATION_SHARD_RESULT}" = "success" ]; then
            echo "::notice title=Fork-safe integration skip::Forked pull requests cannot access DOPPLER_TOKEN_CI, so the secret-backed integration matrix was intentionally skipped."
            exit 0
          fi
          if [ "${CI_HAS_DOPPLER_TOKEN}" != "true" ]; then
            echo "Secret-backed integration shards did not run outside a fork pull request." >&2
            exit 1
          fi
          if [ "${INTEGRATION_SHARD_RESULT}" != "success" ]; then
            echo "One or more integration shards finished with ${INTEGRATION_SHARD_RESULT}." >&2
            exit 1
          fi
          echo "All integration shards passed."

  browser_e2e:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Dashboard E2E
            test_script: test:e2e:dashboard
            artifact_suffix: dashboard
          - name: Issuance E2E
            test_script: test:e2e:issuance
            artifact_suffix: issuance
    env:
      CI_HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI != '' }}
      DATABASE_URL: postgresql://sdp:sdp@127.0.0.1:5432/sdp
      SOLANA_NETWORK: devnet
      PLAYWRIGHT_API_URL: http://127.0.0.1:8787
      PLAYWRIGHT_API_PORT: "8787"
      PLAYWRIGHT_API_PERSIST_PATH: .wrangler/state-playwright
      PLAYWRIGHT_USE_NEXT_START: "1"
      PLAYWRIGHT_NEXT_DIST_DIR: .next-playwright
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sdp
          POSTGRES_USER: sdp
          POSTGRES_PASSWORD: sdp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sdp -d sdp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Doppler bootstrap secret
        if: env.CI_IS_FORK_PULL_REQUEST != 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
        run: |
          if [ -z "${DOPPLER_TOKEN}" ]; then
            echo "DOPPLER_TOKEN_CI must be configured for secret-aware CI jobs." >&2
            exit 1
          fi

      - name: Install Doppler CLI
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        uses: dopplerhq/cli-action@v4

      - name: Validate browser e2e runtime secrets
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
        run: |
          doppler run --config dev_ci -- bash <<'EOF'
          set -euo pipefail
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ] || [ -z "${CLERK_SECRET_KEY:-}" ]; then
            echo "Clerk publishable and secret keys must be set in the dev_ci Doppler config for browser e2e." >&2
            exit 1
          fi
          if [ -z "${PRIVY_APP_ID:-}" ] || [ -z "${PRIVY_APP_SECRET:-}" ]; then
            echo "PRIVY_APP_ID and PRIVY_APP_SECRET must be set in the dev_ci Doppler config for browser e2e." >&2
            exit 1
          fi
          if [ -z "${KORA_RPC_URL:-}" ]; then
            echo "KORA_RPC_URL must be set in the dev_ci Doppler config for browser e2e." >&2
            exit 1
          fi
          EOF

      - name: Derive Clerk issuer for local API
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
        run: |
          CLERK_HOST=$(doppler run --config dev_ci -- node - <<'NODE'
          const key = process.env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || "";
          const encoded = key.split("_").slice(2).join("_");
          if (!encoded) {
            throw new Error("NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required for issuance e2e");
          }
          const normalized = encoded.replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized + "=".repeat((4 - (normalized.length % 4)) % 4);
          const decoded = Buffer.from(padded, "base64").toString("utf8").replace(/\$/g, "").trim();
          if (!decoded) {
            throw new Error("Unable to derive Clerk frontend host from publishable key");
          }
          process.stdout.write(decoded);
          NODE
          )
          echo "CLERK_ISSUER=https://${CLERK_HOST}" >> "$GITHUB_ENV"
          echo "CLERK_JWKS_URL=https://${CLERK_HOST}/.well-known/jwks.json" >> "$GITHUB_ENV"

      - name: Install Playwright browser
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        run: pnpm --filter sdp-web exec playwright install --with-deps chromium

      - name: Build web app for Playwright
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
          DOPPLER_CONFIG: dev_ci
          SDP_API_BASE_URL: ${{ env.PLAYWRIGHT_API_URL }}
          NEXT_PUBLIC_SDP_API_BASE_URL: ${{ env.PLAYWRIGHT_API_URL }}
          SOLANA_RPC_CI_PREFERRED_PROVIDER: quicknode
        run: scripts/doppler/run-with-config.sh node scripts/run-with-healthy-solana-rpc.mjs pnpm --filter sdp-web build

      - name: Run browser e2e suite
        if: env.CI_HAS_DOPPLER_TOKEN == 'true'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
          DOPPLER_CONFIG: dev_ci
          SOLANA_RPC_CI_PREFERRED_PROVIDER: quicknode
        run: scripts/doppler/run-with-config.sh node scripts/run-with-healthy-solana-rpc.mjs pnpm --filter sdp-web run ${{ matrix.test_script }}

      - name: Skip secret-backed browser e2e for fork
        if: env.CI_IS_FORK_PULL_REQUEST == 'true' && env.CI_HAS_DOPPLER_TOKEN != 'true'
        run: |
          echo "::notice title=Fork-safe browser e2e skip::Forked pull requests cannot access DOPPLER_TOKEN_CI, so Clerk/Privy/Kora-backed browser e2e is skipped. Run this PR from an upstream branch before merge if browser e2e coverage is required."

      - name: Upload Playwright artifacts
        if: always() && env.CI_HAS_DOPPLER_TOKEN == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-${{ matrix.artifact_suffix }}
          path: |
            apps/sdp-web/playwright-report
            apps/sdp-web/test-results
          if-no-files-found: ignore
