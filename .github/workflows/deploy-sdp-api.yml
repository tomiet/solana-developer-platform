name: Deploy SDP API

on:
  push:
    branches:
      - main
    tags:
      # NOTE: paths filters do not apply to tag pushes; every matching tag
      # intentionally triggers a production deploy for that release version.
      - v*.*.*
      - solana-developer-platform-v*.*.*
    paths:
      - apps/sdp-api/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-sdp-api.yml
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - dev
          - production
        default: dev
        required: true
      ref:
        description: "Git ref to deploy (commit SHA, tag, or branch)"
        type: string
        required: false
      run_migrations:
        description: "Run Postgres migrations before deploy"
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-sdp-api-${{ github.event_name == 'workflow_dispatch' && inputs.environment || (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/solana-developer-platform-v')) && 'production' || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.event_name == 'workflow_dispatch' && inputs.environment || (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/solana-developer-platform-v')) && 'production' || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/solana-developer-platform-v')) && 'production' || 'dev' }}
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/solana-developer-platform-v')) && 'production' || 'dev' }}
      DOPPLER_CONFIG_NAME: ${{ ((github.event_name == 'workflow_dispatch' && inputs.environment) || ((startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/solana-developer-platform-v')) && 'production') || 'dev') == 'production' && 'prd' || 'dev' }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/solana-developer-platform-v')) && github.ref_name || github.sha }}
      CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}

    steps:
      - name: Validate production tag input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'production' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          if [[ -z "${INPUT_REF}" ]]; then
            echo "Manual production deploys require a release tag ref." >&2
            exit 1
          fi

          if [[ ! "${INPUT_REF}" =~ ^(v|solana-developer-platform-v)[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Production ref must be an existing release tag like v1.2.3 or solana-developer-platform-v1.2.3." >&2
            exit 1
          fi

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if ! git ls-remote --tags --refs "${REPO_URL}" "refs/tags/${INPUT_REF}" | grep -q .; then
            echo "Tag ${INPUT_REF} does not exist in ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.16.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Doppler bootstrap secret
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          if [ -z "${DOPPLER_TOKEN}" ]; then
            echo "DOPPLER_TOKEN must be configured on the ${TARGET_ENV} GitHub environment." >&2
            exit 1
          fi

      - name: Validate Cloud SQL migration identity
        if: ${{ github.event_name == 'push' || inputs.run_migrations }}
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          missing=0
          for name in GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT CLOUD_SQL_INSTANCE_CONNECTION_NAME; do
            if [ -z "${!name:-}" ]; then
              echo "${name} must be configured as a GitHub environment variable on ${TARGET_ENV}." >&2
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        if: ${{ github.event_name == 'push' || inputs.run_migrations }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Start Cloud SQL Auth Proxy
        if: ${{ github.event_name == 'push' || inputs.run_migrations }}
        run: |
          set -euo pipefail
          cloud_sql_proxy_port=5432

          curl -fsSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.18.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

          ./cloud-sql-proxy \
            --address 127.0.0.1 \
            --port "${cloud_sql_proxy_port}" \
            "${CLOUD_SQL_INSTANCE_CONNECTION_NAME}" &

          proxy_pid=$!
          echo "CLOUD_SQL_PROXY_PID=${proxy_pid}" >> "${GITHUB_ENV}"

          for _ in {1..30}; do
            if nc -z 127.0.0.1 "${cloud_sql_proxy_port}"; then
              exit 0
            fi

            if ! kill -0 "${proxy_pid}" 2>/dev/null; then
              echo "Cloud SQL Auth Proxy exited before it became ready." >&2
              wait "${proxy_pid}"
              exit 1
            fi

            sleep 1
          done

          echo "Timed out waiting for Cloud SQL Auth Proxy on 127.0.0.1:${cloud_sql_proxy_port}." >&2
          kill "${proxy_pid}" || true
          exit 1

      - name: Fetch Doppler config
        id: doppler
        # v2.0.0 pinned to an immutable commit because this action injects deploy secrets.
        uses: dopplerhq/secrets-fetch-action@451892f16195f9ac360e1a5bcbf0b5fd0e957534
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Validate fetched Doppler config
        run: |
          set -euo pipefail
          if [ "${DOPPLER_CONFIG:-}" != "${DOPPLER_CONFIG_NAME}" ]; then
            echo "Fetched Doppler config '${DOPPLER_CONFIG:-<unset>}' does not match expected '${DOPPLER_CONFIG_NAME}'." >&2
            exit 1
          fi

      - name: Migrate Postgres
        if: ${{ github.event_name == 'push' || inputs.run_migrations }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL is not configured in Doppler config ${DOPPLER_CONFIG_NAME}; skipping Postgres migrations."
            exit 0
          fi

          export DATABASE_URL="$(node - <<'NODE'
          const raw = process.env.DATABASE_URL;
          const url = new URL(raw);

          url.hostname = "127.0.0.1";
          url.port = "5432";

          for (const key of ["sslmode", "sslcert", "sslkey", "sslrootcert"]) {
            url.searchParams.delete(key);
          }

          process.stdout.write(url.toString());
          NODE
          )"

          pnpm --filter @sdp/api "db:migrate:${TARGET_ENV}"

      - name: Stop Cloud SQL Auth Proxy
        if: ${{ always() && (github.event_name == 'push' || inputs.run_migrations) }}
        run: |
          if [ -n "${CLOUD_SQL_PROXY_PID:-}" ]; then
            kill "${CLOUD_SQL_PROXY_PID}" || true
          fi

      - name: Render Wrangler config
        run: |
          set -euo pipefail
          wrangler_config_path="${GITHUB_WORKSPACE}/apps/sdp-api/.wrangler.${TARGET_ENV}.generated.toml"
          node scripts/render-wrangler-config.mjs --env "${TARGET_ENV}" --out "${wrangler_config_path}"
          echo "WRANGLER_CONFIG_PATH=${wrangler_config_path}" >> "${GITHUB_ENV}"

      - name: Sync Worker secrets
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID must be present in Doppler config ${DOPPLER_CONFIG_NAME}." >&2
            exit 1
          fi
          node scripts/project-secrets.mjs cloudflare --out "${RUNNER_TEMP}/cloudflare-secrets.json"
          pnpm --filter @sdp/api exec wrangler secret bulk "${RUNNER_TEMP}/cloudflare-secrets.json" --env "${TARGET_ENV}" --config "${WRANGLER_CONFIG_PATH}"

      - name: Deploy Worker
        run: pnpm --filter @sdp/api exec wrangler deploy --env "${TARGET_ENV}" --config "${WRANGLER_CONFIG_PATH}"
